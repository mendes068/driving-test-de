<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulado – Prova Prática de Direção Alemã</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117; color: #e6edf3;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 20px 14px 40px;
    }
    header {
      width: 100%; max-width: 680px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header p  { font-size: .78rem; color: #8b949e; margin-top: 2px; }
    .lang-btn {
      background: #21262d; border: 1px solid #30363d; border-radius: 8px;
      color: #c9d1d9; cursor: pointer; font-size: .8rem; padding: 6px 12px;
      white-space: nowrap; flex-shrink: 0; transition: border-color .2s;
    }
    .lang-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    /* Progress */
    .progress-wrap { width: 100%; max-width: 680px; margin-bottom: 16px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: .8rem; color: #8b949e; margin-bottom: 6px; }
    .progress-bar  { height: 6px; background: #21262d; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#238636,#3fb950); border-radius: 999px; transition: width .4s ease; }

    /* Card */
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 14px;
      padding: 24px 22px 20px; width: 100%; max-width: 680px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .category-badge {
      display: inline-block; font-size: .7rem; font-weight: 600;
      letter-spacing: .6px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 999px; margin-bottom: 14px;
    }
    .cat-driving { background:#1f3a5f; color:#58a6ff; border:1px solid #1f6feb; }
    .cat-vehicle { background:#3a1f1f; color:#f78166; border:1px solid #7d2a2a; }

    .question-de {
      font-size: 1.35rem; font-weight: 700; color: #f0f6fc;
      line-height: 1.4; margin-bottom: 12px; transition: filter .3s;
    }
    .question-de.hidden { filter: blur(10px); user-select: none; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .speak-btn, .reveal-btn {
      background: none; border: 1px solid #30363d; border-radius: 8px;
      color: #8b949e; cursor: pointer; font-size: .78rem; padding: 6px 13px;
      display: inline-flex; align-items: center; gap: 5px; transition: border-color .2s, color .2s;
    }
    .speak-btn:hover  { border-color: #58a6ff; color: #58a6ff; }
    .reveal-btn:hover { border-color: #e3b341; color: #e3b341; }

    /* Test mode: answers */
    .answers { display: flex; flex-direction: column; gap: 9px; }
    .answer-btn {
      background: #21262d; border: 1px solid #30363d; border-radius: 10px;
      color: #c9d1d9; cursor: pointer; font-size: .93rem; line-height: 1.45;
      padding: 13px 15px; text-align: left;
      transition: background .15s, border-color .15s, color .15s;
    }
    .answer-btn:hover:not(:disabled) { background:#1f3a5f; border-color:#1f6feb; color:#f0f6fc; }
    .answer-btn.correct { background:#1a3a1f; border-color:#3fb950; color:#3fb950; }
    .answer-btn.wrong   { background:#3a1a1a; border-color:#f85149; color:#f85149; }
    .answer-btn:disabled { cursor: default; }

    /* Learn mode: answer box */
    .learn-answer {
      background: #1a3a1f; border: 1px solid #3fb950;
      border-radius: 12px; padding: 16px 18px;
      font-size: 1rem; color: #3fb950; line-height: 1.5;
      margin-top: 14px;
    }
    .learn-answer small { display: block; margin-top: 6px; color: #6e9f6e; font-size: .82rem; }

    /* Feedback (test mode) */
    .feedback { margin-top: 14px; padding: 13px 15px; border-radius: 10px; font-size: .88rem; line-height: 1.5; display: none; }
    .feedback.show { display: block; }
    .feedback.ok  { background:#1a3a1f; border:1px solid #3fb950; color:#3fb950; }
    .feedback.err { background:#3a1a1a; border:1px solid #f85149; color:#f85149; }

    /* Visual box */
    .visual-box {
      margin-top: 16px; background: #0d1117; border: 1px solid #30363d;
      border-radius: 12px; padding: 14px; display: none; text-align: center;
    }
    .visual-box.show { display: block; }
    .visual-box svg  { max-width: 260px; width: 100%; height: auto; display: block; margin: 0 auto; }
    .visual-box img  { max-width: 100%; border-radius: 8px; display: block; margin: 0 auto; }
    .visual-label { font-size: .8rem; color: #8b949e; margin-top: 10px; }

    /* Next button */
    .next-btn {
      margin-top: 14px; width: 100%; padding: 13px;
      background: linear-gradient(135deg,#238636,#2ea043);
      border: none; border-radius: 10px; color: #fff;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      display: none; transition: opacity .2s;
    }
    .next-btn:hover { opacity: .88; }
    .next-btn.show  { display: block; }

    /* Screens */
    .screen {
      background: #161b22; border: 1px solid #30363d; border-radius: 14px;
      padding: 36px 24px; width: 100%; max-width: 680px;
      text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .screen h2 { font-size: 1.35rem; margin-bottom: 10px; }
    .screen p  { color: #8b949e; font-size: .88rem; margin-bottom: 28px; line-height: 1.65; }

    /* Mode cards on start screen */
    .mode-cards { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .mode-card {
      background: #21262d; border: 2px solid #30363d; border-radius: 14px;
      padding: 22px 20px; cursor: pointer; flex: 1; min-width: 180px; max-width: 260px;
      transition: border-color .2s, background .2s; text-align: center;
    }
    .mode-card:hover { background: #1f2a3a; }
    .mode-card.test:hover  { border-color: #3fb950; }
    .mode-card.learn:hover { border-color: #58a6ff; }
    .mode-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .mode-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .mode-desc  { font-size: .8rem; color: #8b949e; line-height: 1.5; }

    .btn-success {
      padding: 12px 28px; background: linear-gradient(135deg,#238636,#2ea043);
      border: none; border-radius: 10px; color: #fff; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: opacity .2s; margin: 4px;
    }
    .btn-success:hover { opacity: .88; }
    .btn-warn {
      padding: 12px 28px; background: linear-gradient(135deg,#9e6a03,#e3b341);
      border: none; border-radius: 10px; color: #000; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: opacity .2s; margin: 4px;
    }
    .btn-warn:hover { opacity: .88; }

    .score-emoji { font-size: 3rem; margin-bottom: 10px; }
    .score-num   { font-size: 2.8rem; font-weight: 800; color: #3fb950; margin-bottom: 2px; }
    .score-pct   { color: #8b949e; font-size: .85rem; margin-bottom: 22px; }
    .mode-badge  {
      display: inline-block; font-size: .7rem; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; padding: 3px 10px; border-radius: 999px; margin-bottom: 16px;
    }
    .mode-badge-test  { background:#1a3a1f; color:#3fb950; border:1px solid #238636; }
    .mode-badge-learn { background:#1f3a5f; color:#58a6ff; border:1px solid #1f6feb; }

    .quiz-wrap { display: none; width: 100%; max-width: 680px; }
    .quiz-wrap.show { display: block; }
    #scoreScreen { display: none; }
    #scoreScreen.show { display: block; }

    @keyframes drawPath {
      from { stroke-dashoffset: 500; }
      to   { stroke-dashoffset: 0; }
    }
    .animated-arrow { stroke-dasharray: 500; animation: drawPath .7s ease forwards; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .fade-in { animation: fadeIn .35s ease forwards; }
  </style>
</head>
<body>

<header>
  <div>
    <h1 id="headerTitle">🇩🇪 Simulado de Direção</h1>
    <p>Fahrschule Praktische Prüfung</p>
  </div>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">🇬🇧 English</button>
</header>

<!-- Start -->
<div class="screen" id="startScreen">
  <h2 id="startTitle">Escolha o modo</h2>
  <p id="startDesc">A pergunta será sempre em <strong>alemão</strong> e lida automaticamente.</p>
  <div class="mode-cards">
    <div class="mode-card test" onclick="startQuiz('test', false)">
      <div class="mode-icon">📝</div>
      <div class="mode-title" id="testCardTitle">Modo Teste</div>
      <div class="mode-desc"  id="testCardDesc">4 alternativas, pontuação e feedback. Simula o exame.</div>
    </div>
    <div class="mode-card learn" onclick="startQuiz('learn', false)">
      <div class="mode-icon">📖</div>
      <div class="mode-title" id="learnCardTitle">Modo Aprendizado</div>
      <div class="mode-desc"  id="learnCardDesc">Ouça a pergunta, pense, revele a resposta e o visual. Sem pontuação.</div>
    </div>
  </div>
</div>

<!-- Quiz -->
<div class="quiz-wrap" id="quizWrap">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progText">Pergunta 1 de X</span>
      <span id="scoreText"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="card" id="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <span class="category-badge" id="catBadge"></span>
      <span class="mode-badge" id="modeBadge"></span>
    </div>
    <div class="question-de hidden" id="questionDE"></div>
    <div class="btn-row">
      <button class="speak-btn"  onclick="speak()">🔊 <span id="listenLabel">Ouvir em alemão</span></button>
      <button class="reveal-btn" id="revealBtn" onclick="toggleReveal()">👁 <span id="revealLabel">Revelar pergunta</span></button>
    </div>
    <!-- test mode -->
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <!-- learn mode -->
    <div class="learn-answer" id="learnAnswer" style="display:none"></div>
    <!-- shared -->
    <div class="visual-box" id="visualBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()"></button>
  </div>
</div>

<!-- Score (test mode only) -->
<div class="screen" id="scoreScreen">
  <div class="score-emoji" id="scoreEmoji"></div>
  <h2 id="scoreTitle2"></h2>
  <p id="scoreSubtitle"></p>
  <div class="score-num" id="scoreNum"></div>
  <div class="score-pct" id="scorePct"></div>
  <div style="margin-top:8px;">
    <button class="btn-success" onclick="goHome()"     id="homeBtn"></button>
    <button class="btn-warn"    onclick="retryWrong()" id="retryWrongBtn" style="display:none"></button>
  </div>
</div>

<script>
// ── Translations ─────────────────────────────────────────────────────────────

// ── State ─────────────────────────────────────────────────────────────────────
let lang='pt', mode='test', questions=[], current=0;
let correct=0, wrong=0, wrongQuestions=[], answered=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function t(k){return T[lang][k];}

function applyLang(){
  document.getElementById('headerTitle').textContent   = t('headerTitle');
  document.getElementById('startTitle').textContent    = t('startTitle');
  document.getElementById('startDesc').innerHTML       = t('startDesc');
  document.getElementById('testCardTitle').textContent = t('testCardTitle');
  document.getElementById('testCardDesc').textContent  = t('testCardDesc');
  document.getElementById('learnCardTitle').textContent= t('learnCardTitle');
  document.getElementById('learnCardDesc').textContent = t('learnCardDesc');
  document.getElementById('langBtn').textContent       = t('langBtn');
  document.getElementById('listenLabel').textContent   = t('listenLabel');
  document.getElementById('revealLabel').textContent   = t('revealLabel');
}

function toggleLang(){ lang=lang==='pt'?'en':'pt'; applyLang(); }

// ── Quiz flow ─────────────────────────────────────────────────────────────────
function startQuiz(m, wrongOnly){
  mode = m;
  const pool = wrongOnly ? wrongQuestions : ALL_QUESTIONS;
  questions = shuffle([...pool]).map(q=>({...q, answers:shuffle([...q.answers])}));
  current=0; correct=0; wrong=0; wrongQuestions=[];
  document.getElementById('startScreen').style.display='none';
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('quizWrap').classList.add('show');
  renderQuestion();
}

function goHome(){
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('startScreen').style.display='block';
}

function retryWrong(){ startQuiz(mode, true); }

function renderQuestion(){
  answered=false;
  const q=questions[current], total=questions.length;
  document.getElementById('progText').textContent = t('progText')(current+1, total);
  document.getElementById('scoreText').textContent = mode==='test' ? `✓ ${correct}  ✗ ${wrong}` : '';
  document.getElementById('progFill').style.width = `${(current/total)*100}%`;

  const badge=document.getElementById('catBadge');
  badge.className='category-badge '+(q.cat==='driving'?'cat-driving':'cat-vehicle');
  badge.textContent=q.cat==='driving'?t('catDriving'):t('catVehicle');

  const mb=document.getElementById('modeBadge');
  mb.className='mode-badge '+(mode==='test'?'mode-badge-test':'mode-badge-learn');
  mb.textContent=mode==='test'?t('modeBadgeTest'):t('modeBadgeLearn');

  const qEl=document.getElementById('questionDE');
  qEl.textContent=q.de; qEl.classList.add('hidden');
  document.getElementById('revealLabel').textContent=t('revealLabel');

  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').textContent='';
  document.getElementById('visualBox').className='visual-box';
  document.getElementById('visualBox').innerHTML='';
  const la=document.getElementById('learnAnswer');
  la.style.display='none'; la.innerHTML='';
  document.getElementById('nextBtn').className='next-btn';
  const nextLast = current===total-1;
  document.getElementById('nextBtn').textContent = mode==='learn'
    ? t('nextLearnBtn')
    : (nextLast ? t('lastBtn') : t('nextBtn'));

  const answersDiv=document.getElementById('answers');

  if(mode==='test'){
    answersDiv.style.display='flex';
    answersDiv.innerHTML='';
    q.answers.forEach((a,i)=>{
      const btn=document.createElement('button');
      btn.className='answer-btn'; btn.textContent=a[lang];
      btn.onclick=()=>selectAnswer(i);
      answersDiv.appendChild(btn);
    });
  } else {
    // Learn mode: show answer + visual immediately
    answersDiv.style.display='none';
    answersDiv.innerHTML='';
    const ca=q.answers.find(a=>a.correct);
    la.style.display='block';
    la.className='learn-answer fade-in';
    la.innerHTML=`<strong>${ca[lang]}</strong>${ca.tip?`<small>${ca.tip[lang]}</small>`:''}`;
    renderVisual(q);
    document.getElementById('nextBtn').className='next-btn show';
  }

  setTimeout(()=>speak(), 400);
}

function toggleReveal(){
  const qEl=document.getElementById('questionDE');
  const span=document.getElementById('revealLabel');
  qEl.classList.toggle('hidden');
  span.textContent=qEl.classList.contains('hidden')?t('revealLabel'):t('hideLabel');
}

// ── Test mode answer ──────────────────────────────────────────────────────────
function selectAnswer(idx){
  if(answered) return; answered=true;
  const q=questions[current], chosen=q.answers[idx];
  document.querySelectorAll('.answer-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(q.answers[i].correct) btn.classList.add('correct');
    else if(i===idx&&!chosen.correct) btn.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  if(chosen.correct){
    correct++;
    fb.className='feedback ok show';
    fb.innerHTML=t('correct')+(chosen.tip?`<br><small>${chosen.tip[lang]}</small>`:'');
  } else {
    wrong++; wrongQuestions.push(questions[current]);
    const ca=q.answers.find(a=>a.correct);
    fb.className='feedback err show';
    fb.innerHTML=`${t('wrong')} <strong>${ca[lang]}</strong>${ca.tip?`<br><small>${ca.tip[lang]}</small>`:''}`;
  }
  document.getElementById('scoreText').textContent=`✓ ${correct}  ✗ ${wrong}`;
  renderVisual(q);
  document.getElementById('nextBtn').className='next-btn show';
}


function nextQuestion(){
  current++;
  if(current>=questions.length){
    if(mode==='test') showScore();
    else goHome();
  } else renderQuestion();
}

function showScore(){
  document.getElementById('quizWrap').classList.remove('show');
  const pct=Math.round((correct/questions.length)*100);
  document.getElementById('scoreEmoji').textContent  = pct>=90?'🏆':pct>=70?'👍':pct>=50?'📚':'💪';
  document.getElementById('scoreTitle2').textContent = t('scoreTitle')(pct);
  document.getElementById('scoreSubtitle').textContent= t('scoreSubtitle');
  document.getElementById('scoreNum').textContent    = `${correct} / ${questions.length}`;
  document.getElementById('scorePct').textContent    = `${pct}%`;
  document.getElementById('homeBtn').textContent     = t('homeBtn');
  const rb=document.getElementById('retryWrongBtn');
  rb.textContent=t('retryWrongBtn');
  rb.style.display=wrongQuestions.length>0?'inline-block':'none';
  document.getElementById('scoreScreen').classList.add('show');
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function speak(){
  if(!window.speechSynthesis) return;
  const text=questions[current]?.de; if(!text) return;
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='de-DE'; utt.rate=0.88;
  const dv=speechSynthesis.getVoices().find(v=>v.lang.startsWith('de'));
  if(dv) utt.voice=dv;
  speechSynthesis.cancel(); speechSynthesis.speak(utt);
}
if(window.speechSynthesis) speechSynthesis.getVoices();

// ── Visuals ───────────────────────────────────────────────────────────────────
function renderVisual(q){
  if(!q.visual) return;
  const box=document.getElementById('visualBox'), v=q.visual;
  let html='';
  if     (v.type==='direction') html=directionSVG(v.dir);
  else if(v.type==='light')     html=lightSVG(v.icon,v.color);
  else if(v.type==='component') html=componentSVG(v.part);
  else if(v.type==='image')     html=`<img src="${v.src}" alt="${v.label[lang]}" style="max-width:100%;border-radius:8px;">`;
  if(html){ box.innerHTML=html+`<div class="visual-label">${v.label[lang]}</div>`; box.classList.add('show'); }
}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulado – Prova Prática de Direção Alemã</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 14px 40px;
    }
    header {
      width: 100%;
      max-width: 680px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header p  { font-size: .78rem; color: #8b949e; margin-top: 2px; }
    .lang-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      cursor: pointer;
      font-size: .8rem;
      padding: 6px 12px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color .2s;
    }
    .lang-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    /* Progress */
    .progress-wrap { width: 100%; max-width: 680px; margin-bottom: 16px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: .8rem; color: #8b949e; margin-bottom: 6px; }
    .progress-bar  { height: 6px; background: #21262d; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#238636,#3fb950); border-radius: 999px; transition: width .4s ease; }

    /* Card */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 24px 22px 20px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .category-badge {
      display: inline-block;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 14px;
    }
    .cat-driving { background:#1f3a5f; color:#58a6ff; border:1px solid #1f6feb; }
    .cat-vehicle { background:#3a1f1f; color:#f78166; border:1px solid #7d2a2a; }

    .question-de {
      font-size: 1.35rem;
      font-weight: 700;
      color: #f0f6fc;
      line-height: 1.4;
      margin-bottom: 12px;
      transition: filter .3s;
    }
    .question-de.hidden { filter: blur(10px); user-select: none; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .speak-btn, .reveal-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #8b949e;
      cursor: pointer;
      font-size: .78rem;
      padding: 6px 13px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: border-color .2s, color .2s;
    }
    .speak-btn:hover  { border-color: #58a6ff; color: #58a6ff; }
    .reveal-btn:hover { border-color: #e3b341; color: #e3b341; }

    /* Answers */
    .answers { display: flex; flex-direction: column; gap: 9px; }
    .answer-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #c9d1d9;
      cursor: pointer;
      font-size: .93rem;
      line-height: 1.45;
      padding: 13px 15px;
      text-align: left;
      transition: background .15s, border-color .15s, color .15s;
    }
    .answer-btn:hover:not(:disabled) { background:#1f3a5f; border-color:#1f6feb; color:#f0f6fc; }
    .answer-btn.correct { background:#1a3a1f; border-color:#3fb950; color:#3fb950; }
    .answer-btn.wrong   { background:#3a1a1a; border-color:#f85149; color:#f85149; }
    .answer-btn:disabled { cursor: default; }

    /* Feedback */
    .feedback { margin-top: 16px; padding: 13px 15px; border-radius: 10px; font-size: .88rem; line-height: 1.5; display: none; }
    .feedback.show { display: block; }
    .feedback.ok  { background:#1a3a1f; border:1px solid #3fb950; color:#3fb950; }
    .feedback.err { background:#3a1a1a; border:1px solid #f85149; color:#f85149; }

    /* Visual box (shown after answering) */
    .visual-box {
      margin-top: 18px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      display: none;
      text-align: center;
    }
    .visual-box.show { display: block; }
    .visual-box svg  { max-width: 180px; height: auto; display: block; margin: 0 auto; }
    .visual-label { font-size: .8rem; color: #8b949e; margin-top: 10px; }

    .next-btn {
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg,#238636,#2ea043);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: opacity .2s;
    }
    .next-btn:hover { opacity: .88; }
    .next-btn.show  { display: block; }

    /* Start / Score screens */
    .screen {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 36px 24px;
      width: 100%;
      max-width: 680px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .screen h2 { font-size: 1.35rem; margin-bottom: 10px; }
    .screen p  { color: #8b949e; font-size: .88rem; margin-bottom: 22px; line-height: 1.65; }

    .btn-primary {
      padding: 12px 32px;
      background: linear-gradient(135deg,#1f6feb,#388bfd);
      border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s; margin: 4px;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-success {
      padding: 12px 32px;
      background: linear-gradient(135deg,#238636,#2ea043);
      border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s; margin: 4px;
    }
    .btn-success:hover { opacity: .88; }
    .btn-warn {
      padding: 12px 32px;
      background: linear-gradient(135deg,#9e6a03,#e3b341);
      border: none; border-radius: 10px;
      color: #000; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s; margin: 4px;
    }
    .btn-warn:hover { opacity: .88; }

    .score-emoji { font-size: 3.2rem; margin-bottom: 10px; }
    .score-num   { font-size: 2.8rem; font-weight: 800; color: #3fb950; margin-bottom: 2px; }
    .score-pct   { color: #8b949e; font-size: .85rem; margin-bottom: 22px; }

    .quiz-wrap  { display: none; width: 100%; max-width: 680px; }
    .quiz-wrap.show { display: block; }
    #scoreScreen { display: none; }
    #scoreScreen.show { display: block; }
    #startScreen { display: block; }
    #startScreen.hide { display: none; }

    /* Animated arrow for direction visuals */
    @keyframes drawPath {
      from { stroke-dashoffset: 400; }
      to   { stroke-dashoffset: 0; }
    }
    .animated-arrow { stroke-dasharray: 400; animation: drawPath .7s ease forwards; }
  </style>
</head>
<body>

<header>
  <div>
    <h1 id="headerTitle">🇩🇪 Simulado de Direção</h1>
    <p>Fahrschule Praktische Prüfung</p>
  </div>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">🇬🇧 English</button>
</header>

<!-- Start -->
<div class="screen" id="startScreen">
  <h2 id="startTitle">Pronto para começar?</h2>
  <p id="startDesc">Perguntas em <strong>alemão</strong>, como no exame real. A pergunta será lida automaticamente.<br>Respostas em <strong>português</strong>. Escolha a ação correta.</p>
  <button class="btn-primary" onclick="startQuiz(false)" id="startBtn">Iniciar Simulado</button>
</div>

<!-- Quiz -->
<div class="quiz-wrap" id="quizWrap">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progText">Pergunta 1 de X</span>
      <span id="scoreText">✓ 0  ✗ 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="card" id="card">
    <span class="category-badge" id="catBadge"></span>
    <div class="question-de hidden" id="questionDE"></div>
    <div class="btn-row">
      <button class="speak-btn" id="speakBtn" onclick="speak()">🔊 <span id="listenLabel">Ouvir em alemão</span></button>
      <button class="reveal-btn" id="revealBtn" onclick="toggleReveal()">👁 <span id="revealLabel">Revelar pergunta</span></button>
    </div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <div class="visual-box" id="visualBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()"></button>
  </div>
</div>

<!-- Score -->
<div class="screen" id="scoreScreen">
  <div class="score-emoji" id="scoreEmoji"></div>
  <h2 id="scoreTitle2"></h2>
  <p id="scoreSubtitle">Simulado concluído!</p>
  <div class="score-num"  id="scoreNum"></div>
  <div class="score-pct"  id="scorePct"></div>
  <div>
    <button class="btn-success" onclick="restart()" id="restartBtn">Tentar novamente</button>
    <button class="btn-warn"    onclick="retryWrong()" id="retryWrongBtn" style="display:none"></button>
  </div>
</div>

// ── State ───────────────────────────────────────────────────────────────────
let lang          = 'pt';
let questions     = [];
let current       = 0;
let correct       = 0;
let wrong         = 0;
let answered      = false;
let wrongQuestions= [];
let retryMode     = false;

// ── Helpers ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function t(key) { return T[lang][key]; }

function applyLang() {
  document.getElementById('headerTitle').textContent  = t('headerTitle');
  document.getElementById('startTitle').textContent   = t('startTitle');
  document.getElementById('startDesc').innerHTML      = t('startDesc');
  document.getElementById('startBtn').textContent     = t('startBtn');
  document.getElementById('langBtn').textContent      = t('langBtn');
  document.getElementById('listenLabel').textContent  = t('listenLabel');
  document.getElementById('revealLabel').textContent  = t('revealLabel');
}

// ── Quiz flow ────────────────────────────────────────────────────────────────
function startQuiz(wrongOnly) {
  retryMode = wrongOnly;
  const pool = wrongOnly ? wrongQuestions : ALL_QUESTIONS;
  questions = shuffle([...pool]).map(q => ({ ...q, answers: shuffle([...q.answers]) }));
  current = 0; correct = 0; wrong = 0; wrongQuestions = [];

  document.getElementById('startScreen').classList.add('hide');
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('quizWrap').classList.add('show');
  renderQuestion();
}

function restart() {
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('startScreen').classList.remove('hide');
}

function retryWrong() {
  startQuiz(true);
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progText').textContent = t('progText')(current+1, total);
  document.getElementById('scoreText').textContent = `✓ ${correct}  ✗ ${wrong}`;
  document.getElementById('progFill').style.width = `${(current/total)*100}%`;

  const badge = document.getElementById('catBadge');
  badge.className = 'category-badge ' + (q.cat==='driving' ? 'cat-driving' : 'cat-vehicle');
  badge.textContent = q.cat==='driving' ? t('catDriving') : t('catVehicle');

  const qEl = document.getElementById('questionDE');
  qEl.textContent = q.de;
  qEl.classList.add('hidden');

  const revealBtn = document.getElementById('revealBtn');
  document.getElementById('revealLabel').textContent = t('revealLabel');
  revealBtn.querySelector('span').textContent = t('revealLabel');

  const wrap = document.getElementById('answers');
  wrap.innerHTML = '';
  q.answers.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = a[lang];
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('visualBox').className = 'visual-box';
  document.getElementById('visualBox').innerHTML = '';
  document.getElementById('nextBtn').className = 'next-btn';
  document.getElementById('nextBtn').textContent = t('nextBtn');

  // Auto-play TTS
  setTimeout(() => speak(), 400);
}

function toggleReveal() {
  const qEl = document.getElementById('questionDE');
  const span = document.getElementById('revealLabel');
  if (qEl.classList.contains('hidden')) {
    qEl.classList.remove('hidden');
    span.textContent = t('hideLabel');
  } else {
    qEl.classList.add('hidden');
    span.textContent = t('revealLabel');
  }
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const chosen = q.answers[idx];
  const buttons = document.querySelectorAll('.answer-btn');

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (q.answers[i].correct) btn.classList.add('correct');
    else if (i===idx && !chosen.correct) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  const tip = chosen.tip ? chosen.tip[lang] : null;
  if (chosen.correct) {
    correct++;
    fb.className = 'feedback ok show';
    fb.innerHTML = t('correct') + (tip ? `<br><small>${tip}</small>` : '');
  } else {
    wrong++;
    wrongQuestions.push(q);
    const correctAns = q.answers.find(a => a.correct);
    fb.className = 'feedback err show';
    fb.innerHTML = `${t('wrong')} <strong>${correctAns[lang]}</strong>${correctAns.tip ? `<br><small>${correctAns.tip[lang]}</small>` : ''}`;
  }

  document.getElementById('scoreText').textContent = `✓ ${correct}  ✗ ${wrong}`;
  renderVisual(q);
  document.getElementById('nextBtn').className = 'next-btn show';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showScore();
  else renderQuestion();
}

function showScore() {
  document.getElementById('quizWrap').classList.remove('show');
  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById('scoreEmoji').textContent  = pct>=90?'🏆':pct>=70?'👍':pct>=50?'📚':'💪';
  document.getElementById('scoreTitle2').textContent = t('scoreTitle')(pct);
  document.getElementById('scoreSubtitle').textContent = t('scoreSubtitle');
  document.getElementById('scoreNum').textContent    = `${correct} / ${questions.length}`;
  document.getElementById('scorePct').textContent    = `${pct}%`;
  document.getElementById('restartBtn').textContent  = t('restartBtn');
  const retryBtn = document.getElementById('retryWrongBtn');
  retryBtn.textContent = t('retryWrongBtn');
  retryBtn.style.display = wrongQuestions.length > 0 ? 'inline-block' : 'none';
  document.getElementById('scoreScreen').classList.add('show');
}

// ── Language toggle ──────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang==='pt' ? 'en' : 'pt';
  applyLang();
}

// ── TTS ──────────────────────────────────────────────────────────────────────
function speak() {
  if (!window.speechSynthesis) return;
  const text = questions[current]?.de;
  if (!text) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'de-DE'; utt.rate = 0.88;
  const voices = speechSynthesis.getVoices();
  const deVoice = voices.find(v => v.lang.startsWith('de'));
  if (deVoice) utt.voice = deVoice;
  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}
if (window.speechSynthesis) speechSynthesis.getVoices();

// ── Visual renderer ──────────────────────────────────────────────────────────
function renderVisual(q) {
  if (!q.visual) return;
  const box = document.getElementById('visualBox');
  const v = q.visual;
  let html = '';
  if      (v.type==='direction') html = directionSVG(v.dir);
  else if (v.type==='light')     html = lightSVG(v.icon, v.color);
  else if (v.type==='component') html = componentSVG(v.part);
  if (html) {
    box.innerHTML = html + `<div class="visual-label">${v.label[lang]}</div>`;
    box.classList.add('show');
  }
}

    'highway-off':`<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">

      <polygon points="155,122 155,138 167,130" fill="${arrow}"/>
    </svg>`,
  };
  return svgs[dir] || '';
}
